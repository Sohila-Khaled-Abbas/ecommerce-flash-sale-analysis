<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
    <!-- Definitions for Gradients and Shadows -->
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#09090b" />
            <stop offset="100%" stop-color="#18181b" />
        </linearGradient>

        <!-- Node Gradients -->
        <linearGradient id="grad-gen" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8b5cf6" />
            <stop offset="100%" stop-color="#6d28d9" />
        </linearGradient>

        <linearGradient id="grad-storage" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0ea5e9" />
            <stop offset="100%" stop-color="#0284c7" />
        </linearGradient>

        <linearGradient id="grad-analysis" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#10b981" />
            <stop offset="100%" stop-color="#059669" />
        </linearGradient>

        <!-- Drop Shadow -->
        <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
        </filter>
        
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>

        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#71717a" />
        </marker>
    </defs>

    <!-- Background -->
    <rect width="100%" height="100%" fill="url(#bg-grad)" rx="15" ry="15" />

    <!-- Title -->
    <text x="500" y="60" font-family="'Inter', 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle" filter="url(#glow)">VoltEdge Electronics: Scalper Detection Pipeline</text>
    <text x="500" y="90" font-family="'Inter', 'Segoe UI', sans-serif" font-size="16" font-weight="400" fill="#a1a1aa" text-anchor="middle">End-to-end Data Pipeline &amp; Analytics Workflow</text>

    <!-- Block 1: Data Generation -->
    <g transform="translate(80, 200)">
        <rect width="220" height="240" rx="12" fill="#27272a" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)" />
        <rect x="0" y="0" width="220" height="60" fill="url(#grad-gen)" rx="12" />
        <!-- Hide bottom corners of header -->
        <rect x="0" y="40" width="220" height="20" fill="url(#grad-gen)" />
        <text x="110" y="35" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Data Generation</text>
        
        <text x="20" y="95" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#f4f4f5">Synthetic Pipeline</text>
        <circle cx="30" cy="125" r="4" fill="#8b5cf6" />
        <text x="45" y="130" font-family="'Inter', sans-serif" font-size="13" fill="#d4d4d8">PySpark Distributed</text>
        <circle cx="30" cy="155" r="4" fill="#8b5cf6" />
        <text x="45" y="160" font-family="'Inter', sans-serif" font-size="13" fill="#d4d4d8">Data Enrichment</text>
        <circle cx="30" cy="185" r="4" fill="#8b5cf6" />
        <text x="45" y="190" font-family="'Inter', sans-serif" font-size="13" fill="#d4d4d8">Bot Traffic Simulation</text>
        
        <rect x="20" y="210" width="180" height="2" fill="#3f3f46" />
    </g>

    <!-- Arrow 1 -->
    <path d="M 310 320 L 380 320" stroke="#71717a" stroke-width="3" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="6,4"/>

    <!-- Block 2: Storage Layer -->
    <g transform="translate(390, 200)">
        <rect width="220" height="240" rx="12" fill="#27272a" stroke="#0ea5e9" stroke-width="2" filter="url(#shadow)" />
        <rect x="0" y="0" width="220" height="60" fill="url(#grad-storage)" rx="12" />
        <rect x="0" y="40" width="220" height="20" fill="url(#grad-storage)" />
        <text x="110" y="35" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Storage Layer</text>

        <text x="20" y="95" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#f4f4f5">Delta Lake</text>
        
        <!-- Cylinder SVG representing DB/Delta Table -->
        <g transform="translate(85, 120)">
            <ellipse cx="25" cy="0" rx="25" ry="10" fill="#38bdf8" />
            <rect x="0" y="0" width="50" height="40" fill="#0ea5e9" />
            <ellipse cx="25" cy="40" rx="25" ry="10" fill="#0284c7" />
        </g>
        
        <text x="110" y="200" font-family="'Inter', sans-serif" font-size="13" fill="#d4d4d8" text-anchor="middle">6.5M+ Records</text>
        <text x="110" y="220" font-family="'Inter', sans-serif" font-size="12" fill="#a1a1aa" text-anchor="middle">ACID Transactions</text>
    </g>

    <!-- Arrow 2 -->
    <path d="M 620 320 L 690 320" stroke="#71717a" stroke-width="3" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="6,4"/>

    <!-- Block 3: Ad-Hoc Analysis -->
    <g transform="translate(700, 200)">
        <rect width="220" height="240" rx="12" fill="#27272a" stroke="#10b981" stroke-width="2" filter="url(#shadow)" />
        <rect x="0" y="0" width="220" height="60" fill="url(#grad-analysis)" rx="12" />
        <rect x="0" y="40" width="220" height="20" fill="url(#grad-analysis)" />
        <text x="110" y="35" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">VoltEdge Analytics</text>

        <text x="20" y="95" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#f4f4f5">Spark SQL Engine</text>
        <circle cx="30" cy="125" r="4" fill="#10b981" />
        <text x="45" y="130" font-family="'Inter', sans-serif" font-size="13" fill="#d4d4d8">Cohort LTV Analysis</text>
        <circle cx="30" cy="155" r="4" fill="#10b981" />
        <text x="45" y="160" font-family="'Inter', sans-serif" font-size="13" fill="#d4d4d8">60s Rolling Windows</text>
        <circle cx="30" cy="185" r="4" fill="#10b981" />
        <text x="45" y="190" font-family="'Inter', sans-serif" font-size="13" fill="#d4d4d8">Scalper Anomaly Detection</text>

        <rect x="20" y="210" width="180" height="2" fill="#3f3f46" />
    </g>

    <!-- Legend/Footer -->
    <rect x="300" y="500" width="400" height="50" rx="8" fill="#27272a" fill-opacity="0.9" stroke="#3f3f46" />
    <circle cx="350" cy="525" r="6" fill="#8b5cf6" />
    <text x="365" y="530" font-family="'Inter', sans-serif" font-size="13" fill="#d4d4d8">Compute</text>
    
    <circle cx="470" cy="525" r="6" fill="#0ea5e9" />
    <text x="485" y="530" font-family="'Inter', sans-serif" font-size="13" fill="#d4d4d8">Storage</text>
    
    <circle cx="580" cy="525" r="6" fill="#10b981" />
    <text x="595" y="530" font-family="'Inter', sans-serif" font-size="13" fill="#d4d4d8">Analytics</text>

</svg>
