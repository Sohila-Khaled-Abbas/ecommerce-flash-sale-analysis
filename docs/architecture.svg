<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
    <!-- Definitions for Gradients and Shadows -->
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f172a" />
            <stop offset="100%" stop-color="#1e293b" />
        </linearGradient>

        <!-- Node Gradients -->
        <linearGradient id="grad-gen" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6" />
            <stop offset="100%" stop-color="#2563eb" />
        </linearGradient>

        <linearGradient id="grad-storage" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#10b981" />
            <stop offset="100%" stop-color="#059669" />
        </linearGradient>

        <linearGradient id="grad-analysis" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f59e0b" />
            <stop offset="100%" stop-color="#d97706" />
        </linearGradient>

        <!-- Drop Shadow -->
        <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
        </filter>
        
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Background -->
    <rect width="100%" height="100%" fill="url(#bg-grad)" rx="15" ry="15" />

    <!-- Title -->
    <text x="500" y="60" font-family="'Inter', 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle" filter="url(#glow)">Flash Sale Cannibalization &amp; Bot Exploitation Architecture</text>
    <text x="500" y="90" font-family="'Inter', 'Segoe UI', sans-serif" font-size="16" font-weight="400" fill="#94a3b8" text-anchor="middle">End-to-end Data Pipeline &amp; Analytics Workflow</text>

    <!-- Block 1: Data Generation -->
    <g transform="translate(80, 200)">
        <rect width="220" height="240" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)" />
        <rect x="0" y="0" width="220" height="60" fill="url(#grad-gen)" rx="12" />
        <!-- Hide bottom corners of header -->
        <rect x="0" y="40" width="220" height="20" fill="url(#grad-gen)" />
        <text x="110" y="35" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Data Generation</text>
        
        <text x="20" y="95" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">Synthetic Pipeline</text>
        <circle cx="30" cy="125" r="4" fill="#3b82f6" />
        <text x="45" y="130" font-family="'Inter', sans-serif" font-size="13" fill="#cbd5e1">PySpark / Databricks</text>
        <circle cx="30" cy="155" r="4" fill="#3b82f6" />
        <text x="45" y="160" font-family="'Inter', sans-serif" font-size="13" fill="#cbd5e1">Distributed Generation</text>
        <circle cx="30" cy="185" r="4" fill="#3b82f6" />
        <text x="45" y="190" font-family="'Inter', sans-serif" font-size="13" fill="#cbd5e1">Bot Traffic Simulation</text>
        
        <rect x="20" y="210" width="180" height="2" fill="#334155" />
    </g>

    <!-- Arrow 1 -->
    <path d="M 310 320 L 380 320" stroke="#475569" stroke-width="4" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="8,4"/>
    <polygon points="380,315 390,320 380,325" fill="#94a3b8" />

    <!-- Block 2: Storage Layer -->
    <g transform="translate(390, 200)">
        <rect width="220" height="240" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2" filter="url(#shadow)" />
        <rect x="0" y="0" width="220" height="60" fill="url(#grad-storage)" rx="12" />
        <rect x="0" y="40" width="220" height="20" fill="url(#grad-storage)" />
        <text x="110" y="35" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Storage Layer</text>

        <text x="20" y="95" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">Delta Lake</text>
        
        <!-- Cylinder SVG representing DB/Delta Table -->
        <g transform="translate(85, 120)">
            <ellipse cx="25" cy="0" rx="25" ry="10" fill="#34d399" />
            <rect x="0" y="0" width="50" height="40" fill="#10b981" />
            <ellipse cx="25" cy="40" rx="25" ry="10" fill="#059669" />
        </g>
        
        <text x="110" y="200" font-family="'Inter', sans-serif" font-size="13" fill="#cbd5e1" text-anchor="middle">6.5M+ Records</text>
        <text x="110" y="220" font-family="'Inter', sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">ACID Transactions</text>
    </g>

    <!-- Arrow 2 -->
    <path d="M 620 320 L 690 320" stroke="#475569" stroke-width="4" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="8,4"/>
    <polygon points="690,315 700,320 690,325" fill="#94a3b8" />

    <!-- Block 3: Ad-Hoc Analysis -->
    <g transform="translate(700, 200)">
        <rect width="220" height="240" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)" />
        <rect x="0" y="0" width="220" height="60" fill="url(#grad-analysis)" rx="12" />
        <rect x="0" y="40" width="220" height="20" fill="url(#grad-analysis)" />
        <text x="110" y="35" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Ad-Hoc Analysis</text>

        <text x="20" y="95" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">Spark Analytics</text>
        <circle cx="30" cy="125" r="4" fill="#f59e0b" />
        <text x="45" y="130" font-family="'Inter', sans-serif" font-size="13" fill="#cbd5e1">Cohort LTV Analysis</text>
        <circle cx="30" cy="155" r="4" fill="#f59e0b" />
        <text x="45" y="160" font-family="'Inter', sans-serif" font-size="13" fill="#cbd5e1">60s Rolling Windows</text>
        <circle cx="30" cy="185" r="4" fill="#f59e0b" />
        <text x="45" y="190" font-family="'Inter', sans-serif" font-size="13" fill="#cbd5e1">Anomaly Detection</text>

        <rect x="20" y="210" width="180" height="2" fill="#334155" />
    </g>

    <!-- Legend/Footer -->
    <rect x="300" y="500" width="400" height="50" rx="8" fill="#1e293b" fill-opacity="0.8" stroke="#334155" />
    <circle cx="350" cy="525" r="6" fill="#3b82f6" />
    <text x="365" y="530" font-family="'Inter', sans-serif" font-size="13" fill="#cbd5e1">Compute</text>
    
    <circle cx="470" cy="525" r="6" fill="#10b981" />
    <text x="485" y="530" font-family="'Inter', sans-serif" font-size="13" fill="#cbd5e1">Storage</text>
    
    <circle cx="580" cy="525" r="6" fill="#f59e0b" />
    <text x="595" y="530" font-family="'Inter', sans-serif" font-size="13" fill="#cbd5e1">Analytics</text>

</svg>
